# Configuration for Linear Preprocessing Pipeline
# Used for Logistic Regression and other linear models.

pipeline:
  schema_validation:
    enabled: true
    strict: true
    allow_extra_columns: true

  leakage_validation:
    enabled: true
    fail_on_detection: false

  metadata:
    version: "2.0"

  available_components:
    - cleaner
    - missing
    - rare_categories
    - encoder
    - outliers
    - scaler

  steps:
    - component: cleaner
      params:
        drop_row_duplicates: true
        drop_col_duplicates: true
        coerce_objects_to_category: true
        datetime_cols: []

    - component: missing
      params:
        num_strategy: "median"
        cat_strategy: "constant"
        cat_fill_value: "Unknown"
        add_indicators: true

    - component: rare_categories
      params:
        threshold_pct: 0.01
        fill_value: "OTHER"

    - component: encoder
      params:
        default_strategy: "one_hot"  # One-hot encoding is preferred for linear models

    - component: outliers
      params:
        strategy: "clip"
        method: "iqr"
        threshold: 1.5

    - component: scaler
      params:
        default_strategy: "robust"  # RobustScaler to center and scale numerical features
