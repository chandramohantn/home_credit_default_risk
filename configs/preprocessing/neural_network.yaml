# Configuration for Neural Network Preprocessing Pipeline
# Used for MLP and deep learning models.

pipeline:
  schema_validation:
    enabled: true
    strict: true
    allow_extra_columns: true

  leakage_validation:
    enabled: true
    fail_on_detection: false

  metadata:
    version: "2.0"

  available_components:
    - cleaner
    - missing
    - rare_categories
    - encoder
    - outliers
    - transformations
    - scaler

  steps:
    - component: cleaner
      params:
        drop_row_duplicates: true
        drop_col_duplicates: true
        coerce_objects_to_category: true
        datetime_cols: []

    - component: missing
      params:
        num_strategy: "median"
        cat_strategy: "constant"
        cat_fill_value: "Unknown"
        add_indicators: true

    - component: rare_categories
      params:
        threshold_pct: 0.01
        fill_value: "OTHER"

    - component: encoder
      params:
        default_strategy: "catboost"  # Ordered target statistics are strong for deep tabular models
        target_cv_folds: 5
        target_smoothing: 10.0
        catboost_prior: 10.0

    - component: outliers
      params:
        strategy: "clip"
        method: "iqr"
        threshold: 1.5

    - component: transformations
      params:
        transformations:
          AMT_INCOME_TOTAL: "log1p"
          AMT_CREDIT: "log1p"
          AMT_ANNUITY: "log1p"

    - component: scaler
      params:
        default_strategy: "quantile"  # QuantileTransformer to map features to a normal distribution
